<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R07 — Registro de Discipulado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap">
  <link rel="stylesheet" href="style.css">
  <script>
    // Tema: aplicar antes del paint para evitar flash
    (function () {
      try {
        const t = localStorage.getItem('r07_theme') || 'light';
        document.documentElement.dataset.theme = t;
      } catch (e) { document.documentElement.dataset.theme = 'light'; }
    })();
  </script>
</head>

<body>
  <div class="app">
    <header class="no-print">
      <div class="header-nav">
        <button id="prev-month" class="icon-btn" aria-label="Mes anterior">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <h1 id="month-title"></h1>
        <button id="next-month" class="icon-btn" aria-label="Mes siguiente">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="icon-btn" aria-label="Cambiar tema" title="Cambiar tema">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="print-btn" class="btn-print-main">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
          <span>Imprimir / PDF</span>
        </button>
      </div>
    </header>

    <div class="print-header">
      <h2 id="print-month-title"></h2>
    </div>

    <div class="calendar-wrapper">
      <div class="calendar-head no-mobile-head">
        <span>Domingo</span><span>Lunes</span><span>Martes</span><span>Miércoles</span><span>Jueves</span><span>Viernes</span><span>Sábado</span>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>
  </div>

  <div class="modal-overlay no-print" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close" aria-label="Cerrar">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-discard-btn" class="btn-discard">Descartar</button>
        <div class="save-side">
          <span id="save-indicator" class="save-indicator">✓ Guardado</span>
          <button id="modal-save-btn" class="btn-primary">Guardar y Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Toggle de tema (no toca la lógica de la app)
    (function () {
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', () => {
        const cur = document.documentElement.dataset.theme || 'light';
        const next = cur === 'light' ? 'dark' : 'light';
        document.documentElement.dataset.theme = next;
        try { localStorage.setItem('r07_theme', next); } catch (e) { }
      });
    })();
  </script>
</body>

</html>
